kind = "web"
previewPath = "/"
title = "Nisuwa Cartel Buyback"
version = "1.0.0"
id = "artifacts/buyback"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20153

[services.development]
run = "pnpm --filter @workspace/buyback run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/buyback", "run", "build" ]
publicDir = "artifacts/buyback/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20153"
BASE_PATH = "/"
